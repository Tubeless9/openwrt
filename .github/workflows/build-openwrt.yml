name: Build OpenWrt BTF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev \
        libssl-dev python3 python3-distutils rsync unzip zlib1g-dev \
        file wget curl

    - name: Clone OpenWrt
      run: |
        git clone https://github.com/openwrt/openwrt
        cd openwrt
        git checkout v25.12.1

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Copy config
      run: |
        cp config/openwrt.config openwrt/.config

    - name: Make defconfig
      run: |
        cd openwrt
        make defconfig

    - name: Download
      run: |
        cd openwrt
        make download -j8

    - name: Compile
      run: |
        cd openwrt
        make -j$(nproc)

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-x86-btf
        path: openwrt/bin/targets/x86/64/*
